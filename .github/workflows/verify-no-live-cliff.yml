name: verify-no-live-cliff
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify-no-live-cliff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run ci:verify-no-live-cliff

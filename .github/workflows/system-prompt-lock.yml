name: system-prompt-lock

# Authoritative gate for the help-chatbox system prompt (drift ruling 2026-06-06 §4).
# No path filter on purpose: a required check that is "skipped" by a path filter can
# be treated as passing by some branch-protection setups. This always runs and is
# fast, so it cannot be evaded by how the change touches the file.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-system-prompt-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify SYSTEM_PROMPT matches its attorney-gated lock
        run: node scripts/check_system_prompt_lock.mjs
      - name: Verify DOCUMENTS interim-language sunset gate
        run: node scripts/check_documents_sunset.mjs
      - name: Verify CLASSIFIER_PROMPT matches its attorney-gated lock
        run: node scripts/check_classifier_prompt_lock.mjs

name: verify-parcel-health-core-sync
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify-parcel-health-core-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run ci:verify-parcel-health-core-sync

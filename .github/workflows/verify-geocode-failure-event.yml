name: verify-geocode-failure-event
on:
  pull_request:
  push:
    branches: [main]
jobs:
  verify-geocode-failure-event:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run ci:verify-geocode-failure-event
